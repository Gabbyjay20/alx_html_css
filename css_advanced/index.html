<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo">😊 SmileSchool</div>
        <nav>
            <a href="#">COURSES</a>
            <a href="#">PRICING</a>
            <a href="#">LOGIN</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Get schooled</h1>
        <div class="tags">
            <span>SMILES</span>
            <span>GRIN</span>
            <span>LAUGH</span>
        </div>
        <button><a href="#" class="btn">REGISTER FOR FREE</a></button>
        <div class="subtext"><span class="highlight"> Learn</span> from the pros </div>
    </section>

    <section class="profiles">
        <div class="profile">
            <img src="images/1.png" alt="Phillip Massey">
            <h3>Phillip Massey</h3>
            <p>« Smile of the year »<br>2018 - 2019</p>
        </div>
        <div class="profile">
            <img src="images/3.png" alt="Nannie Lawrence">
            <h3>Nannie Lawrence</h3>
            <p>Best « little smile »<br>2017</p>
        </div>
        <div class="profile">
            <img src="images/2.png" alt="Bruce Walters">
            <h3>Bruce Walters</h3>
            <p>Best « Friend Smile »<br>Live performance 2019</p>
        </div>
        <div class="profile">
            <img src="images/4.png" alt="Henry Hughes">
            <h3>Henry Hughes</h3>
            <p>« 24h smiles » winner<br>2016 - 2019</p>
        </div>
    </section>
</body>

</html>
